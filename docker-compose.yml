version: '3.8'

x-common-variables: &common-variables
  ENV_FOR_DYNACONF: development
  PYTHONPATH: /app

services:
  # ==========================================
  # 1. ORCHESTRATOR: Apache Airflow
  # ==========================================
  airflow:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    image: audio-pipeline-airflow:latest
    container_name: airflow_orchestrator
    restart: always
    command: standalone
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow_db:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=FB1oqX9A6dn7H8S6UtSdfVka3F9c_2A8389_asdjK1A=
    volumes:
      # Set up live DAGs for development
      - ./airflow/dags:/opt/airflow/dags
      # Map the Docker socket so that Airflow uses DockerOperator
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    depends_on:
      airflow_db:
        condition: service_healthy

  # Local database required by Airflow for its Metadata
  airflow_db:
    image: postgres:15-alpine
    container_name: airflow_metadata_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # 2. PROCESSING: PySpark ETL (Template for Airflow)
  # ==========================================
  etl_spark:
    build:
      context: .
      dockerfile: docker/etl.Dockerfile
    image: audio-pipeline-etl:latest
    container_name: etl_spark_processor
    profiles: ["pipeline_tasks"] # Prevent it from turning on automatically when doing 'docker compose up'
    environment:
      <<: *common-variables
    volumes:
      - ./config:/app/config
      - ./etl:/app/etl
      - ./data:/app/data  # Mapping to read /raw and write /processed

  # ==========================================
  # 3. TRAINING: TensorFlow / Keras (Template for Airflow)
  # ==========================================
  ml_training:
    build:
      context: .
      dockerfile: docker/training.Dockerfile
    image: audio-pipeline-training:latest
    container_name: ml_tensorflow_trainer
    profiles: ["pipeline_tasks"]
    environment:
      <<: *common-variables
    volumes:
      - ./config:/app/config
      - ./ml:/app/ml
      - ./data:/app/data  # Read the parquet floors generated by Spark

  # ==========================================
  # 4. SERVICE: Inference FastAPI (Always On)
  # ==========================================
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: audio-pipeline-api:latest
    container_name: fastapi_inference_server
    restart: unless-stopped
    environment:
      <<: *common-variables
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - ./api:/app/api
      - ./ml/artifacts:/app/ml/artifacts # Dynamic loading of the trained .keras model