version: '3.8'

services:
  # Tu base de datos para la metadata de Airflow
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow

  # Tu entorno local de Airflow para mover el pipeline de Spark
  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    depends_on:
      - postgres
    volumes:
      - ./dags:/opt/airflow/dags
      - ./etl:/opt/airflow/etl
      - ./data:/opt/airflow/data
    ports:
      - "8080:8080"